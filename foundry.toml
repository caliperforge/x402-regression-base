[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
# CI-runnable-in-under-five-minutes fuzz + invariant budgets on ubuntu-latest;
# raise in [profile.ci] as coverage grows.
fuzz = { runs = 512 }
invariant = { runs = 128, depth = 32, fail_on_revert = false }

[profile.ci]
fuzz = { runs = 1024 }
invariant = { runs = 256, depth = 48, fail_on_revert = false }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
