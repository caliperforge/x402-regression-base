name: live-mainnet

# Runs the deploy + settle smoke against Base mainnet (chainId 8453) using
# the canonical Coinbase-issued USDC (0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913).
# Fires only on manual dispatch — mainnet deploys are intentional, not
# nightly. Uses Actions secrets only; no key ever lands in the repo
# (M1 spec §5.8).
#
# Required secrets (drop into Settings -> Secrets -> Actions on the repo):
#
#   BASE_MAINNET_RPC_URL   Full Base mainnet RPC URL (Alchemy / Infura /
#                          QuickNode / self-hosted). Free tier suffices
#                          for W6 volume.
#   OPERATOR_KEY_MAINNET   Burner wallet private key (0x-prefixed hex).
#                          MUST be a freshly-generated burner with only
#                          the ~0.01 ETH intended for the deploy; NEVER
#                          reuse a wallet with production balances.
#
# Optional:
#
#   BASESCAN_API_KEY       Enables source verification on the deployed
#                          facilitator. Not W6-blocking.

on:
  workflow_dispatch:
    inputs:
      skip_harness:
        description: 'Skip the planted-twin fork run after settle smoke.'
        required: false
        default: 'false'
      settle_value:
        description: 'Settle value in USDC base units (default 0; requires operator to hold >=value canonical USDC on Base mainnet).'
        required: false
        default: '0'

concurrency:
  group: live-mainnet
  cancel-in-progress: false

jobs:
  deploy-and-settle:
    name: deploy X402Facilitator + settle smoke (Base mainnet)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: base-mainnet
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Foundry setup (pinned)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Deploy + settle + harness (Base mainnet)
        shell: bash
        env:
          X402_RPC_URL: ${{ secrets.BASE_MAINNET_RPC_URL }}
          OPERATOR_KEY: ${{ secrets.OPERATOR_KEY_MAINNET }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
          X402_USDC: '0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913'
          X402_SETTLE_VALUE: ${{ inputs.settle_value }}
          X402_SKIP_MINT: 'true'
          X402_SKIP_HARNESS: ${{ inputs.skip_harness == 'true' && '1' || '0' }}
        run: |
          # Mask the key defensively; foundry-toolchain does not mask.
          echo "::add-mask::${OPERATOR_KEY}"
          chmod +x ./ci/live_mainnet.sh
          ./ci/live_mainnet.sh

      - name: Upload Basescan record artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mainnet-run-record
          path: docs/basescan/mainnet_run_*.md
          if-no-files-found: warn
          retention-days: 365

      - name: Upload broadcast files (auditable tx-hash provenance)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mainnet-broadcast
          path: broadcast/**/8453/run-latest.json
          if-no-files-found: warn
          retention-days: 365
